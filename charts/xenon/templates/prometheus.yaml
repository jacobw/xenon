apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  labels: {app: prometheus}
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: gnmic
        static_configs:
          - targets: ["gnmic.{{ .Release.Namespace }}.svc.cluster.local:9273"]
            labels:
              {{- toYaml .Values.deviceLabels | nindent 14 }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data
  labels: {app: prometheus}
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: {{ .Values.prometheus.storage.storageClassName }}
  resources:
    requests:
      storage: {{ .Values.prometheus.storage.size }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  labels: {app: prometheus}
spec:
  replicas: 1
  strategy: {type: Recreate}
  selector:
    matchLabels: {app: prometheus}
  template:
    metadata:
      labels: {app: prometheus}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      containers:
        - name: prometheus
          image: {{ .Values.prometheus.image | quote }}
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time={{ .Values.prometheus.retention }}"
          ports:
            - {name: web, containerPort: 9090}
          volumeMounts:
            - {name: config, mountPath: /etc/prometheus}
            - {name: data, mountPath: /prometheus}
          resources: {{ toYaml .Values.prometheus.resources | nindent 12 }}
      volumes:
        - name: config
          configMap: {name: prometheus-config}
        - name: data
          persistentVolumeClaim: {claimName: prometheus-data}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  labels: {app: prometheus}
spec:
  selector: {app: prometheus}
  ports:
    - {name: web, port: 9090, targetPort: 9090}
