apiVersion: apps/v1
kind: Deployment
metadata:
  name: xenond
  labels: {app: xenond}
spec:
  replicas: 1
  # SQLite lives on an RWO volume, which a single pod must own. maxSurge:0 forces
  # the old pod to terminate (releasing the volume) before the new one is created
  # — the RWO-safe equivalent of Recreate, but it keeps strategy.type unchanged so
  # server-side-apply upgrades from a prior RollingUpdate revision don't fail with
  # "rollingUpdate may not be specified when type is Recreate".
  strategy:
    type: RollingUpdate
    rollingUpdate: {maxSurge: 0, maxUnavailable: 1}
  selector:
    matchLabels: {app: xenond}
  template:
    metadata:
      labels: {app: xenond}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{ toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: xenond
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - {name: XENON_ADDR, value: ":8080"}
            - {name: XENON_DB, value: "/data/xenon.db"}
            - name: XENON_PROM
              value: "http://prometheus.{{ .Release.Namespace }}.svc.cluster.local:9090"
            # Credentials for live onboarding (xenond's embedded gNMI client).
            - {name: GNMIC_USERNAME, value: {{ .Values.gnmic.username | quote }}}
            - name: GNMIC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credentials.existingSecret }}
                  key: GNMIC_PASSWORD
          ports:
            - {name: http, containerPort: 8080}
          readinessProbe:
            httpGet: {path: /, port: 8080}
            initialDelaySeconds: 3
          livenessProbe:
            httpGet: {path: /, port: 8080}
            initialDelaySeconds: 10
          resources: {{ toYaml .Values.xenond.resources | nindent 12 }}
          volumeMounts:
            - {name: data, mountPath: /data}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim | default "xenond-data" }}
{{- if and .Values.persistence.enabled (not .Values.persistence.existingClaim) }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: xenond-data
  labels: {app: xenond}
spec:
  accessModes: ["ReadWriteOnce"]
  {{- with .Values.persistence.storageClass }}
  storageClassName: {{ . | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.size | quote }}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: xenond
  labels: {app: xenond}
spec:
  selector: {app: xenond}
  ports:
    - {name: http, port: 8080, targetPort: 8080}
{{- if .Values.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: xenond
  {{- with .Values.ingress.annotations }}
  annotations: {{ toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: xenond
                port: {number: 8080}
  {{- with .Values.ingress.tls }}
  tls: {{ toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
