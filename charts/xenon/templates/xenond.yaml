apiVersion: apps/v1
kind: Deployment
metadata:
  name: xenond
  labels: {app: xenond}
spec:
  replicas: 1
  selector:
    matchLabels: {app: xenond}
  template:
    metadata:
      labels: {app: xenond}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{ toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: xenond
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - {name: XENON_ADDR, value: ":8080"}
            - name: XENON_PROM
              value: "http://prometheus.{{ .Release.Namespace }}.svc.cluster.local:9090"
            # Credentials for live onboarding (xenond shells out to gnmic, which
            # reads these GNMIC_* env vars as --username/--password/--skip-verify).
            - {name: GNMIC_USERNAME, value: {{ .Values.gnmic.username | quote }}}
            - name: GNMIC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credentials.existingSecret }}
                  key: GNMIC_PASSWORD
            - {name: GNMIC_SKIP_VERIFY, value: "true"}
          ports:
            - {name: http, containerPort: 8080}
          readinessProbe:
            httpGet: {path: /, port: 8080}
            initialDelaySeconds: 3
          livenessProbe:
            httpGet: {path: /, port: 8080}
            initialDelaySeconds: 10
          resources: {{ toYaml .Values.xenond.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: xenond
  labels: {app: xenond}
spec:
  selector: {app: xenond}
  ports:
    - {name: http, port: 8080, targetPort: 8080}
{{- if .Values.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: xenond
  {{- with .Values.ingress.annotations }}
  annotations: {{ toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: xenond
                port: {number: 8080}
  {{- with .Values.ingress.tls }}
  tls: {{ toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
